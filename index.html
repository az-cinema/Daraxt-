<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дарахт</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3efe6;
}

h1{
    text-align:center;
    padding:20px;
}

.tree{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
}

.row{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.person{
    background:white;
    padding:12px 18px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    font-weight:bold;
}
</style>

</head>

<body>

<h1>🌳 Родословная семьи</h1>

<div class="tree">

<div class="row">
<div class="person">Абдурасулбобо</div>
</div>

<div class="row">
<div class="person">Абдурафик</div>
<div class="person">Махмуд</div>
<div class="person">Туйчи</div>
<div class="person">Амма Хасан</div>
<div class="person">Тохир</div>
</div>

<div class="row">
<div class="person">Дилрабо</div>
<div class="person">Шавкат</div>
<div class="person">Зулайхо</div>
<div class="person">Хикмат</div>
<div class="person">Умаро</div>
<div class="person">Исматилло</div>
<div class="person">Иззатилло</div>
</div>

<div class="row">
<div class="person">Гулшан</div>
<div class="person">Азамат</div>
<div class="person">Фикрат</div>
<div class="person">Пака</div>
</div>

</div>

</body>
</html>
